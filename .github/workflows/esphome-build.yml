name: ESPHome Build Test


on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  esphome-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESPHome
        run: |
          python -m pip install --upgrade pip
          pip install esphome

      - name: Build ESPHome config
        run: |
          esphome compile esphome_config_local_build.yaml
